  <p>Fill out the form below to contact Path of Light Yoga Studio. All information is required.</p>

  <form method="post" action="https://webdevbasics.net/scripts/yoga.php">

    <label for="name">Name:</label>
    <input type="text" name="myName" id="name" required>
    <br><br>
  
    <label for="email">E-mail:</label>
    <input type="email" name="myEmail" id="email" required>
    <br><br>
  
    <label for="myRefer">How did you hear about us?</label>
    <input type="text" name="myRefer" id="myRefer" list="referral" required>

      <option value="Bing">
      <option value="Facebook">
      <option value="Friend">
      <option value="Radio Ad">
    </datalist>
    <br><br>
  
    <label for="Comments">Comments:</label>
    <textarea name="Comments" id="Comments" rows="2" cols="20" required></textarea>
    <br><br>
  
    <input type="submit" id="mySubmit" value="Send Now">
